<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <title>Test Login</title>
    <style>
      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      body {
        font-family: Arial, sans-serif;
      }

      .login-container {
        display: flex;
        height: 100vh;
        width: 100%;
      }

      .login-left {
        width: 50%;
        padding: 60px;
        display: flex;
        flex-direction: column;
        justify-content: center;
      }

      .login-right {
        width: 50%;
        height: 100vh;
        background-image: url("assets/img/login/login-bg.png");
        background-size: cover;
        background-position: center;
      }

      .logo img {
        width: 180px;
        max-width: 100%;
        height: auto;
        object-fit: contain;
        margin-bottom: 40px;
      }

      h1 {
        font-size: 32px;
        margin-bottom: 30px;
      }

      .login-form {
        display: flex;
        flex-direction: column;
      }

      .login-form label {
        margin-top: 15px;
        font-weight: bold;
      }

      .login-form input {
        width: 100%;
        padding: 14px;
        border: 1px solid #ccc;
        border-radius: 6px;
        font-size: 16px;
        margin-top: 5px;
      }

      .btn-login {
        margin-top: 25px;
        padding: 14px;
        width: 100%;
        background-color: #ff4444;
        color: white;
        border: none;
        border-radius: 6px;
        font-size: 18px;
        cursor: pointer;
      }

      .btn-login:hover {
        background-color: #e63a3a;
      }

      .links {
        margin-top: 20px;
        display: flex;
        flex-direction: column;
      }

      .links a {
        margin-top: 8px;
        color: #007bff; /* azul corporativo */
        text-decoration: none;
        font-size: 14px;
      }

      .links a:hover {
        text-decoration: underline;
      }
    </style>
  </head>
  <body>
    <div class="login-container">
      <div class="login-left">
        <div class="logo">
          <img src="assets/img/logo/logo-fit360.png" alt="Fit360" />
        </div>

        <h1>Iniciar sesión</h1>

        <form class="login-form">
          <label>Email</label>
          <input type="email" />

          <label>Contraseña</label>
          <input type="password" />

          <button type="button" class="btn-login">Entrar</button>
          <div class="links">
            <a href="#">¿Has olvidado tu contraseña?</a>
            <a href="#">Crear cuenta</a>
          </div>
        </form>
      </div>

      <div class="login-right"></div>
    </div>
  </body>
</html>
